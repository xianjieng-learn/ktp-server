<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KTP Auto-Crop</title>
  <style>
    body{width:260px;margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#fff}
    h1{font-size:17px;margin:0 0 6px}p{font-size:12px;color:#94a3b8;margin:0 0 14px;line-height:1.4}
    button{width:100%;border:0;border-radius:10px;background:#3b82f6;color:#fff;font-weight:700;padding:12px;cursor:pointer}
    button:hover{background:#2563eb}.hint{margin-top:10px;font-size:11px;color:#64748b}
  </style>
</head>
<body>
  <h1>📸 KTP Auto-Crop</h1>
  <p>Buka halaman kamera, foto/pilih KTP, crop otomatis, simpan ke Downloads.</p>
  <button id="openApp">Buka Kamera</button>
  <div class="hint">Tip: klik kanan extension → Pin biar gampang dicari.</div>
  <script src="popup.js"></script>
</body>
</html>
