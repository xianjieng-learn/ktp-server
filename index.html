<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTP Auto-Crop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        
        .card {
            width: 100%;
            max-width: 380px;
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
        }
        
        .upload-zone {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-zone:hover { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
        .upload-zone .icon { font-size: 48px; margin-bottom: 10px; }
        .upload-zone h3 { font-size: 16px; margin-bottom: 4px; }
        .upload-zone p { font-size: 12px; color: #64748b; }
        .upload-zone input { display: none; }

        /* Camera viewfinder */
        .camera-container {
            display: none;
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 0;
            animation: fadeIn 0.3s ease;
        }
        .camera-container.show {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .camera-container video {
            width: 100%;
            display: block;
            border-radius: 12px;
            object-fit: cover;
        }

        /* KTP guide overlay */
        .ktp-guide-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
        }
        .ktp-guide-frame {
            position: relative;
            /* KTP ratio: 85.6/53.98 ≈ 1.586 */
            width: 82%;
            aspect-ratio: 1.586 / 1;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 4px;
            /* Darken outside using box-shadow trick */
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
        }
        .ktp-guide-frame .guide-text {
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(255,255,255,0.85);
            white-space: nowrap;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            pointer-events: none;
        }

        /* Corner marks */
        .corner-mark {
            position: absolute;
            width: 22px;
            height: 22px;
            pointer-events: none;
        }
        .corner-mark::before,
        .corner-mark::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.9);
        }
        .corner-mark::before {
            width: 3px;
            height: 22px;
        }
        .corner-mark::after {
            width: 22px;
            height: 3px;
        }
        /* Top-left */
        .corner-mark.tl { top: -2px; left: -2px; }
        .corner-mark.tl::before { top: 0; left: 0; }
        .corner-mark.tl::after { top: 0; left: 0; }
        /* Top-right */
        .corner-mark.tr { top: -2px; right: -2px; }
        .corner-mark.tr::before { top: 0; right: 0; }
        .corner-mark.tr::after { top: 0; right: 0; }
        /* Bottom-left */
        .corner-mark.bl { bottom: -2px; left: -2px; }
        .corner-mark.bl::before { bottom: 0; left: 0; }
        .corner-mark.bl::after { bottom: 0; left: 0; }
        /* Bottom-right */
        .corner-mark.br { bottom: -2px; right: -2px; }
        .corner-mark.br::before { bottom: 0; right: 0; }
        .corner-mark.br::after { bottom: 0; right: 0; }

        /* Camera controls */
        .camera-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 16px 0 8px;
            gap: 10px;
        }
        .camera-controls.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        .capture-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 4px solid white;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: transform 0.15s;
            padding: 0;
        }
        .capture-btn:active { transform: scale(0.9); }
        .capture-btn::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.15s;
        }
        .capture-btn:active::after { background: #dc2626; }

        .gallery-link {
            font-size: 12px;
            color: #94a3b8;
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: underline;
            padding: 4px 8px;
        }
        .gallery-link:hover { color: #cbd5e1; }

        .close-camera-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 5;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(4px);
        }
        .close-camera-btn:hover { background: rgba(0,0,0,0.8); }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #475569; cursor: not-allowed; }
        .btn-download { background: #059669; color: white; display: none; }
        .btn-download:hover { background: #047857; }
        
        .preview {
            width: 100%;
            margin-top: 12px;
            display: none;
        }
        .preview.show { display: block; }
        .preview img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #334155;
        }
        .preview .info {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin-top: 6px;
        }
        
        .status {
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .status.show { display: block; }
        .status.ok { background: #064e3b; color: #6ee7b7; }
        .status.err { background: #7f1d1d; color: #fca5a5; }
        .status.info { background: #1e3a5f; color: #93c5fd; }
        
        .tip {
            margin-top: 20px;
            width: 100%;
            max-width: 380px;
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
        }
        .tip h3 { font-size: 14px; margin-bottom: 8px; color: #fbbf24; }
        .tip ul { font-size: 12px; color: #94a3b8; padding-left: 18px; }
        .tip li { margin-bottom: 4px; }

        /* Hidden canvas for capture */
        #captureCanvas { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 KTP Auto-Crop</h1>
        <p>Foto → Auto-Crop → Download</p>
    </div>
    
    <div class="card">
        <!-- Upload zone (initial state) -->
        <div class="upload-zone" id="zone">
            <div class="icon">📷</div>
            <h3>Ketuk untuk Foto</h3>
            <p>atau pilih dari galeri</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <!-- Camera viewfinder -->
        <div class="camera-container" id="cameraContainer">
            <button class="close-camera-btn" id="closeCameraBtn">✕ Tutup</button>
            <video id="cameraVideo" autoplay playsinline></video>
            <div class="ktp-guide-overlay">
                <div class="ktp-guide-frame">
                    <div class="corner-mark tl"></div>
                    <div class="corner-mark tr"></div>
                    <div class="corner-mark bl"></div>
                    <div class="corner-mark br"></div>
                    <span class="guide-text">Posisikan KTP di area ini</span>
                </div>
            </div>
        </div>

        <!-- Camera controls -->
        <div class="camera-controls" id="cameraControls">
            <button class="capture-btn" id="captureBtn" title="Ambil Foto"></button>
            <button class="gallery-link" id="galleryBtn">atau pilih dari galeri</button>
        </div>
        
        <div class="preview" id="preview">
            <img id="previewImg">
            <div class="info" id="previewInfo"></div>
        </div>
        
        <button class="btn btn-primary" id="cropBtn" disabled>✂️ Crop KTP</button>
        <button class="btn btn-download" id="downloadBtn">📥 Download</button>
        
        <div class="status" id="status"></div>
    </div>
    
    <div class="tip">
        <h3>💡 Tips</h3>
        <ul>
            <li>Foto dari angle apa aja, auto-detect KTP</li>
            <li>Hasil crop langsung bisa didownload</li>
            <li>Transfer ke komputer pakai Snapdrop/Telegram</li>
        </ul>
    </div>

    <!-- Hidden canvas for capturing video frame -->
    <canvas id="captureCanvas"></canvas>
    <!-- Hidden file input for gallery fallback -->
    <input type="file" id="galleryInput" accept="image/*" style="display:none">

<script>
const KTP_RATIO = 85.6 / 53.98;

// DOM elements
const zone = document.getElementById('zone');
const fileInput = document.getElementById('fileInput');
const cropBtn = document.getElementById('cropBtn');
const downloadBtn = document.getElementById('downloadBtn');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const previewInfo = document.getElementById('previewInfo');
const statusEl = document.getElementById('status');

// Camera elements
const cameraContainer = document.getElementById('cameraContainer');
const cameraVideo = document.getElementById('cameraVideo');
const cameraControls = document.getElementById('cameraControls');
const captureBtn = document.getElementById('captureBtn');
const closeCameraBtn = document.getElementById('closeCameraBtn');
const galleryBtn = document.getElementById('galleryBtn');
const galleryInput = document.getElementById('galleryInput');
const captureCanvas = document.getElementById('captureCanvas');

let selectedFile = null;
let croppedBlob = null;
let cameraStream = null;

// ── Upload zone click → open live camera ──
zone.addEventListener('click', () => openCamera());

// ── Gallery input ──
galleryBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    galleryInput.click();
});
fileInput.addEventListener('change', e => { 
    if (e.target.files[0]) handleFile(e.target.files[0]); 
});
galleryInput.addEventListener('change', e => {
    if (e.target.files[0]) {
        stopCamera();
        handleFile(e.target.files[0]);
    }
});

// ── Camera functions ──
async function openCamera() {
    // Check if getUserMedia is supported
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showStatus('err', '⚠️ Kamera tidak didukung. Silakan pilih dari galeri.');
        fileInput.click();
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            },
            audio: false
        });
        cameraStream = stream;
        cameraVideo.srcObject = stream;
        
        // Hide upload zone, show camera
        zone.style.display = 'none';
        cameraContainer.classList.add('show');
        cameraControls.classList.add('show');
        
        // Hide preview/crop/download while camera is open
        preview.classList.remove('show');
        downloadBtn.style.display = 'none';
        cropBtn.disabled = true;
        statusEl.className = 'status';
    } catch (err) {
        console.warn('getUserMedia failed:', err);
        showStatus('err', '⚠️ Tidak bisa akses kamera. Silakan pilih dari galeri.');
        // Fallback to file picker
        fileInput.click();
    }
}

function stopCamera() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
    }
    cameraVideo.srcObject = null;
    cameraContainer.classList.remove('show');
    cameraControls.classList.remove('show');
    zone.style.display = '';
}

closeCameraBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    stopCamera();
});

// ── Capture photo from video ──
captureBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!cameraStream) return;

    const video = cameraVideo;
    const canvas = captureCanvas;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Stop camera
    stopCamera();

    // Convert to blob and handle
    canvas.toBlob(function(blob) {
        if (!blob) {
            showStatus('err', '❌ Gagal mengambil foto.');
            return;
        }
        // Create a File from blob so handleFile works as before
        const file = new File([blob], 'ktp_capture_' + Date.now() + '.jpg', {
            type: 'image/jpeg'
        });
        handleFile(file);
    }, 'image/jpeg', 0.95);
});

// ── Handle selected file (camera capture or gallery) ──
function handleFile(file) {
    selectedFile = file;
    croppedBlob = null;
    cropBtn.disabled = false;
    downloadBtn.style.display = 'none';
    
    const reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        previewInfo.textContent = file.name || 'Foto dari kamera';
        preview.classList.add('show');
    };
    reader.readAsDataURL(file);
}

// ── Crop button ──
cropBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    
    cropBtn.disabled = true;
    cropBtn.textContent = '⏳ Cropping...';
    showStatus('info', '⏳ Detecting KTP...');
    
    try {
        croppedBlob = await autoCropKTP(selectedFile);
        
        if (!croppedBlob) {
            showStatus('err', '❌ KTP tidak terdeteksi. Coba foto dari angle yang lebih frontal.');
            cropBtn.disabled = false;
            cropBtn.textContent = '✂️ Crop KTP';
            return;
        }
        
        // Show cropped result
        const url = URL.createObjectURL(croppedBlob);
        previewImg.src = url;
        previewInfo.textContent = 'Hasil crop (' + (croppedBlob.size/1024).toFixed(0) + ' KB)';
        
        downloadBtn.style.display = 'block';
        showStatus('ok', '✅ KTP ter-crop! Klik Download untuk menyimpan.');
        cropBtn.textContent = '✂️ Crop Lagi';
        cropBtn.disabled = false;
    } catch(err) {
        showStatus('err', '❌ Error: ' + err.message);
        cropBtn.disabled = false;
        cropBtn.textContent = '✂️ Crop KTP';
    }
});

// ── Download button ──
downloadBtn.addEventListener('click', () => {
    if (!croppedBlob) return;
    
    const url = URL.createObjectURL(croppedBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ktp_' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'') + '.jpg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showStatus('ok', '✅ Downloaded! Sekarang transfer ke komputer.');
});

// ── Auto-crop algorithm (unchanged) ──
async function autoCropKTP(file) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // Grayscale
            const gray = new Uint8Array(canvas.width * canvas.height);
            for (let i = 0; i < gray.length; i++) {
                const idx = i * 4;
                gray[i] = (data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114) | 0;
            }
            
            // Edge detection (Sobel)
            const edges = new Uint8Array(canvas.width * canvas.height);
            for (let y = 1; y < canvas.height - 1; y++) {
                for (let x = 1; x < canvas.width - 1; x++) {
                    const idx = y * canvas.width + x;
                    const gx = -gray[(y-1)*canvas.width+x-1] + gray[(y-1)*canvas.width+x+1]
                              -2*gray[y*canvas.width+x-1] + 2*gray[y*canvas.width+x+1]
                              -gray[(y+1)*canvas.width+x-1] + gray[(y+1)*canvas.width+x+1];
                    const gy = -gray[(y-1)*canvas.width+x-1] - 2*gray[(y-1)*canvas.width+x] - gray[(y-1)*canvas.width+x+1]
                              +gray[(y+1)*canvas.width+x-1] + 2*gray[(y+1)*canvas.width+x] + gray[(y+1)*canvas.width+x+1];
                    edges[idx] = Math.min(255, Math.sqrt(gx*gx + gy*gy)) | 0;
                }
            }
            
            // Find bounding box
            let minX = canvas.width, maxX = 0, minY = canvas.height, maxY = 0;
            let edgeCount = 0;
            
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    if (edges[y * canvas.width + x] > 50) {
                        minX = Math.min(minX, x);
                        maxX = Math.max(maxX, x);
                        minY = Math.min(minY, y);
                        maxY = Math.max(maxY, y);
                        edgeCount++;
                    }
                }
            }
            
            // Check if KTP detected
            if (edgeCount < (canvas.width * canvas.height * 0.01)) {
                resolve(null);
                return;
            }
            
            // Add padding
            const pad = 20;
            minX = Math.max(0, minX - pad);
            minY = Math.max(0, minY - pad);
            maxX = Math.min(canvas.width - 1, maxX + pad);
            maxY = Math.min(canvas.height - 1, maxY + pad);
            
            let cropW = maxX - minX;
            let cropH = maxY - minY;
            
            // Adjust to KTP ratio
            if (Math.abs(cropW / cropH - KTP_RATIO) > 0.3) {
                cropH = cropW / KTP_RATIO;
            }
            
            // Create output
            const outCanvas = document.createElement('canvas');
            const outW = 1200;
            const outH = Math.round(outW / KTP_RATIO);
            outCanvas.width = outW;
            outCanvas.height = outH;
            
            const outCtx = outCanvas.getContext('2d');
            outCtx.drawImage(canvas, minX, minY, cropW, cropH, 0, 0, outW, outH);
            
            outCanvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.92);
        };
        img.src = URL.createObjectURL(file);
    });
}

function showStatus(type, msg) {
    statusEl.className = 'status show ' + type;
    statusEl.textContent = msg;
}

// Stop camera if user navigates away
window.addEventListener('beforeunload', stopCamera);
document.addEventListener('visibilitychange', () => {
    if (document.hidden && cameraStream) {
        stopCamera();
    }
});
</script>
</body>
</html>
